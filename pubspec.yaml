name: savie
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  auto_route: ^8.2.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  auto_route_generator: ^8.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1
  flutter_gen_runner: ^5.4.0

flutter_gen:
  output: lib/presentation/shared/assets/

  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: New York Large
      fonts:
        - asset: fonts/new_york_large/NewYorkLarge-Black.otf
          weight: 900
        - asset: fonts/new_york_large/NewYorkLarge-BlackItalic.otf
          weight: 900
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Bold.otf
          weight: 700
        - asset: fonts/new_york_large/NewYorkLarge-BoldItalic.otf
          weight: 700
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Heavy.otf
          weight: 800
        - asset: fonts/new_york_large/NewYorkLarge-HeavyItalic.otf
          weight: 800
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Medium.otf
          weight: 500
        - asset: fonts/new_york_large/NewYorkLarge-MediumItalic.otf
          weight: 500
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Regular.otf
          weight: 400
        - asset: fonts/new_york_large/NewYorkLarge-RegularItalic.otf
          weight: 400
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Semibold.otf
          weight: 600
        - asset: fonts/new_york_large/NewYorkLarge-SemiboldItalic.otf
          weight: 600
          style: italic

    - family: Inter
      fonts:
        - asset: fonts/inter/Inter-Black.ttf
          weight: 900
        - asset: fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: fonts/inter/Inter-ExtraBold.ttf
          weight: 800
        - asset: fonts/inter/Inter-ExtraLight.ttf
          weight: 200
        - asset: fonts/inter/Inter-Light.ttf
          weight: 300
        - asset: fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/inter/Inter-Thin.ttf
          weight: 100
