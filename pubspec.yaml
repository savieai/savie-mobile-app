name: savie
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  auto_route: ^8.2.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  flutter_svg: ^2.0.10+1
  dotted_border: ^2.1.0
  flutter_bloc: ^8.1.6
  freezed_annotation: ^2.4.1
  uuid: ^4.4.0
  file_picker: ^8.0.5
  collection: ^1.18.0
  record: ^5.1.2
  path_provider: ^2.1.3
  blobs: ^2.0.0
  wave_blob: ^1.0.5
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0
  gesture_x_detector: ^1.1.1
  modal_bottom_sheet: ^3.0.0
  photo_manager: ^3.2.0
  flutter_cache_manager: ^3.3.2
  camera: ^0.11.0+1
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  photo_view: ^0.15.0
  status_bar_control: ^3.2.1
  flutter_sticky_header: ^0.6.5
  supabase_flutter: ^2.5.8
  firebase_core: ^3.2.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  auto_route_generator: ^8.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1
  flutter_gen_runner: ^5.4.0
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.13.1

flutter_gen:
  output: lib/presentation/shared/assets/

  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: New York Large
      fonts:
        - asset: fonts/new_york_large/NewYorkLarge-Black.otf
          weight: 900
        - asset: fonts/new_york_large/NewYorkLarge-BlackItalic.otf
          weight: 900
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Bold.otf
          weight: 700
        - asset: fonts/new_york_large/NewYorkLarge-BoldItalic.otf
          weight: 700
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Heavy.otf
          weight: 800
        - asset: fonts/new_york_large/NewYorkLarge-HeavyItalic.otf
          weight: 800
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Medium.otf
          weight: 500
        - asset: fonts/new_york_large/NewYorkLarge-MediumItalic.otf
          weight: 500
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Regular.otf
          weight: 400
        - asset: fonts/new_york_large/NewYorkLarge-RegularItalic.otf
          weight: 400
          style: italic
        - asset: fonts/new_york_large/NewYorkLarge-Semibold.otf
          weight: 600
        - asset: fonts/new_york_large/NewYorkLarge-SemiboldItalic.otf
          weight: 600
          style: italic

    - family: Inter
      fonts:
        - asset: fonts/inter/Inter-Black.ttf
          weight: 900
        - asset: fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: fonts/inter/Inter-ExtraBold.ttf
          weight: 800
        - asset: fonts/inter/Inter-ExtraLight.ttf
          weight: 200
        - asset: fonts/inter/Inter-Light.ttf
          weight: 300
        - asset: fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/inter/Inter-Thin.ttf
          weight: 100

    - family: SF Mono
      fonts:
        - asset: fonts/sf_mono/SFMono-Bold.otf
          weight: 700
        - asset: fonts/sf_mono/SFMono-Heavy.otf
          weight: 800
        - asset: fonts/sf_mono/SFMono-Light.otf
          weight: 300
        - asset: fonts/sf_mono/SFMono-Medium.otf
          weight: 500
        - asset: fonts/sf_mono/SFMono-Regular.otf
          weight: 400
        - asset: fonts/sf_mono/SFMono-Semibold.otf
          weight: 600

flutter_launcher_icons:
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true